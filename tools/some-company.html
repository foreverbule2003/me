<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大云財務趨勢視覺化儀表板</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* 數字等寬對齊 */
      td {
        font-variant-numeric: tabular-nums;
      }
      /* 變化率指標 - 極低視覺權重 */
      .change-indicator {
        font-size: 10px;
        opacity: 0.65;
        margin-top: 2px;
        font-weight: 400;
        text-align: right;
      }
      .change-indicator .up {
        color: #059669;
      }
      .change-indicator .down {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="../src/pages/tools/some-company/main.jsx"
    ></script>
  </body>
</html>
