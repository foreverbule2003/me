<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />

    <title>CB War Room | Me Tools</title>
    <!-- [Fix] Suppress duplicate custom element error from third-party scripts -->
    <script>
      (function () {
        const originalDefine = customElements.define;
        customElements.define = function (name, constructor, options) {
          if (name === "mce-autosize-textarea" && customElements.get(name)) {
            console.warn(`[Guard] Ignored duplicate definition for ${name}`);
            return;
          }
          originalDefine.call(customElements, name, constructor, options);
        };
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
