    <title>CB Analytics Engine | Me Tools</title>
    <!-- [Fix] Suppress duplicate custom element error from third-party scripts -->
    <script>
      (function () {
        const originalDefine = customElements.define;
        customElements.define = function (name, constructor, options) {
          try {
            originalDefine.call(customElements, name, constructor, options);
          } catch (e) {
            if (e.message.includes("has already been defined")) {
              console.warn(
                `[Guard] Suppressed duplicate definition for ${name}`,
              );
              return;
            }
            throw e;
          }
        };
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
